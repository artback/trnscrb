name: Update Homebrew Formula

on:
  push:
    tags:
      - "v*"

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Verify tag matches package version and sits on main
        run: |
          pkg_version=$(grep -m1 '^version = ' src/pyproject.toml | cut -d'"' -f2)
          tag_version="${GITHUB_REF#refs/tags/v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag v${tag_version} points at a commit whose pyproject.toml says ${pkg_version}."
            echo "::error::This usually means the tag was created on the wrong commit (stale local main?)."
            echo "::error::Fix: git fetch origin && git tag -f v${pkg_version} origin/main && git push -f origin v${pkg_version}"
            exit 1
          fi
          git -C src fetch --depth=200 origin main
          if ! git -C src merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tag v${tag_version} is not on main — refusing to release it."
            exit 1
          fi

      - name: Download tarball and compute SHA256
        id: sha
        run: |
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz"
          sha=$(curl -sL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: artback/homebrew-trnscrb
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          sed -i 's|url "https://github.com/.*/archive/refs/tags/.*\.tar\.gz"|url "${{ steps.sha.outputs.url }}"|' Formula/trnscrb.rb
          sed -i 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' Formula/trnscrb.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/trnscrb.rb
          git commit -m "Update trnscrb to ${{ steps.tag.outputs.version }}"
          git push
